<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piedra Papel Tijera Gato Neón 🐾</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="screen active" id="screen-intro">
    <div class="gif-container neon-circle">
      <img src="assets/img/inicio.gif" alt="Gatito jugando">
    </div>
    <h1>Piedra Papel Tijera</h1>
    <p>🐾 La versión gatuna neón — 3 intentos para ganar 🐾</p>
    <button class="btn-main" onclick="startGame()">Comenzar</button>
  </div>

  <div class="screen" id="screen-game">
    <div class="game-header">
      <div class="score-item">
        <span class="score-label">Tú</span>
        <span class="score-value" id="score-player">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Intentos</span>
        <div class="dots-container" id="dots">
          <div class="dot" id="dot-1"></div>
          <div class="dot" id="dot-2"></div>
          <div class="dot" id="dot-3"></div>
        </div>
      </div>
      <div class="score-item">
        <span class="score-label">CPU</span>
        <span class="score-value" id="score-cpu">0</span>
      </div>
    </div>

    <p class="game-title">Elige tu patita</p>

    <div class="battle-area">
      <div class="player-card">
        <span class="player-label">Tú</span>
        <div class="choice-display neon-circle-battle" id="display-player">
          <svg viewBox="0 0 100 100"><text x="50" y="65" text-anchor="middle" font-size="40" fill="white">❓</text></svg>
        </div>
      </div>
      <span class="vs-badge">VS</span>
      <div class="player-card">
        <span class="player-label">CPU</span>
        <div class="choice-display neon-circle-battle" id="display-cpu">
          <svg viewBox="0 0 100 100"><text x="50" y="65" text-anchor="middle" font-size="40" fill="white">❓</text></svg>
        </div>
      </div>
    </div>

    <div class="round-msg" id="round-msg"></div>

    <div class="choices-row">
      <button class="choice-btn neon-btn" id="btn-rock" onclick="play('rock')">
        <svg viewBox="0 0 100 120" fill="none"><rect x="28" y="30" width="14" height="20" rx="7" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="44" y="25" width="14" height="20" rx="7" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="60" y="30" width="14" height="20" rx="7" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="22" y="42" width="58" height="52" rx="16" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><ellipse cx="51" cy="76" rx="16" ry="12" fill="#ff8ec4" opacity="0.9"/><ellipse cx="31" cy="60" rx="7" ry="5.5" fill="#ff8ec4" opacity="0.9"/><ellipse cx="51" cy="57" rx="7" ry="5.5" fill="#ff8ec4" opacity="0.9"/><ellipse cx="71" cy="60" rx="7" ry="5.5" fill="#ff8ec4" opacity="0.9"/></svg>
      </button>
      <button class="choice-btn neon-btn" id="btn-paper" onclick="play('paper')">
        <svg viewBox="0 0 100 130" fill="none"><rect x="24" y="10" width="13" height="50" rx="6.5" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="39" y="5" width="13" height="55" rx="6.5" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="54" y="8" width="13" height="52" rx="6.5" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="18" y="50" width="65" height="62" rx="18" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><ellipse cx="50" cy="90" rx="18" ry="13" fill="#ff8ec4" opacity="0.9"/><ellipse cx="29" cy="72" rx="7.5" ry="6" fill="#ff8ec4" opacity="0.9"/><ellipse cx="50" cy="68" rx="7.5" ry="6" fill="#ff8ec4" opacity="0.9"/><ellipse cx="71" cy="72" rx="7.5" ry="6" fill="#ff8ec4" opacity="0.9"/></svg>
      </button>
      <button class="choice-btn neon-btn" id="btn-scissors" onclick="play('scissors')">
        <svg viewBox="0 0 100 130" fill="none"><rect x="24" y="8" width="13" height="52" rx="6.5" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="54" y="8" width="13" height="52" rx="6.5" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="39" y="42" width="13" height="30" rx="6.5" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><rect x="18" y="55" width="65" height="60" rx="18" fill="#1a1a1a" stroke="var(--neon-pink)" stroke-width="2.5"/><ellipse cx="50" cy="93" rx="18" ry="13" fill="#ff8ec4" opacity="0.9"/><ellipse cx="29" cy="74" rx="7" ry="5.5" fill="#ff8ec4" opacity="0.9"/><ellipse cx="50" cy="70" rx="7" ry="5.5" fill="#ff8ec4" opacity="0.9"/><ellipse cx="71" cy="74" rx="7" ry="5.5" fill="#ff8ec4" opacity="0.9"/></svg>
      </button>
    </div>
  </div>

  <div class="screen" id="screen-lose">
    <div class="end-img-container neon-circle-lose"><img src="assets/img/perdiste.png" alt="Perdiste"></div>
    <div class="end-title lose">¡Perdiste!</div>
    <button class="btn-main secondary" onclick="goHome()">Volver</button>
  </div>

  <div class="screen" id="screen-draw">
    <div class="end-img-container neon-circle-draw"><img src="assets/img/empate.png" alt="Empate"></div>
    <div class="end-title draw">¡Empate! 🐾</div>
    <button class="btn-main secondary" onclick="goHome()">Volver</button>
  </div>

  <div class="screen" id="screen-win">
    <div class="stars-container" id="stars"></div>
    <div class="end-img-container neon-circle-win"><img src="assets/img/ganasteeee.png" alt="Ganaste"></div>
    <div class="end-title win">¡Ganaste! 🎉</div>
    <button class="btn-main" onclick="goHome()">Jugar de nuevo</button>
  </div>
<footer class="game-footer">
  <div class="footer-logo">
    <img src="assets/img/traipe_logo16.png" alt="Traipe Logo">
  </div>

  <div class="security-badge">
    <span class="security-icon glow-pulse-small">🛡️</span>
    <span class="security-text">SECURE_CONNECTION_VERIFIED // [AES-256]</span>
  </div>

  <div class="retro-title glow-pulse">
    w w w . T r a i p e . c l
  </div>

  <div class="footer-caption">
    <span id="current-year"></span> — Desarrollado con Vue & Vuetify, por Traipe ©
  </div>
</footer>

  <script src="/assets/js/script.js"></script>
</body>
</html>
